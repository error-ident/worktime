<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="WORK//TIME">
<meta name="theme-color" content="#080810">
<title>WORK//TIME</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Share+Tech+Mono&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #080810;
  --bg2: #0d0d1a;
  --bg3: #12121f;
  --red: #FF2D2D;
  --red-dim: rgba(255,45,45,0.1);
  --red-glow: rgba(255,45,45,0.25);
  --blue: #1E6FFF;
  --blue-dim: rgba(30,111,255,0.1);
  --yellow: #FFD600;
  --yellow-dim: rgba(255,214,0,0.1);
  --text: #ffffff;
  --muted: #7a7a9a;
  --border: #1a1a2e;
  --border2: #252540;
  --mono: 'Share Tech Mono', monospace;
  --display: 'Bebas Neue', sans-serif;
  --japan: 'Black Han Sans', sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--mono); overscroll-behavior: none; }
body { display: flex; flex-direction: column; max-width: 420px; margin: 0 auto; }

.scanline {
  position: fixed; inset: 0; pointer-events: none; z-index: 999;
  background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px);
}

.topbar {
  padding: 52px 20px 14px;
  border-bottom: 1px solid var(--border2);
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  background: var(--bg);
}
.app-title {
  font-family: var(--display);
  font-size: 28px;
  letter-spacing: 0.1em;
  color: var(--red);
  line-height: 1;
  text-shadow: 0 0 20px var(--red-glow);
}
.app-sub {
  font-size: 9px;
  color: var(--muted);
  letter-spacing: 0.2em;
  margin-top: 2px;
}
.status-pill {
  font-size: 10px;
  padding: 5px 10px;
  border-radius: 2px;
  border: 1px solid var(--muted);
  color: var(--muted);
  font-family: var(--mono);
  letter-spacing: 0.05em;
  display: flex;
  align-items: center;
  gap: 6px;
  transition: all 0.3s;
}
.status-pill.active {
  border-color: var(--red);
  color: var(--red);
  box-shadow: 0 0 8px var(--red-glow);
}
.status-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--muted); flex-shrink: 0; }
.status-pill.active .status-dot { background: var(--red); animation: blink 1s step-end infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

.total-section {
  padding: 20px;
  border-bottom: 1px solid var(--border2);
  background: var(--bg2);
  position: relative;
  overflow: hidden;
}
.total-section::before {
  content: 'NEO-TOKYO';
  position: absolute;
  right: -10px;
  top: 50%;
  transform: translateY(-50%) rotate(90deg);
  font-family: var(--display);
  font-size: 60px;
  color: rgba(255,45,45,0.04);
  letter-spacing: 0.1em;
  pointer-events: none;
}
.total-label { font-size: 9px; color: var(--muted); letter-spacing: 0.2em; text-transform: uppercase; margin-bottom: 6px; }
.total-value {
  font-family: var(--display);
  font-size: 52px;
  line-height: 1;
  color: var(--text);
  letter-spacing: 0.05em;
  transition: color 0.3s;
}
.total-value.plus { color: var(--yellow); text-shadow: 0 0 20px rgba(255,214,0,0.3); }
.total-value.minus { color: var(--red); text-shadow: 0 0 20px var(--red-glow); }
.total-meta { font-size: 10px; color: var(--muted); margin-top: 6px; letter-spacing: 0.08em; }

.btn-section {
  padding: 16px 20px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  border-bottom: 1px solid var(--border2);
  background: var(--bg);
}
.btn-main {
  background: var(--bg3);
  border: 1px solid var(--border2);
  border-radius: 2px;
  padding: 18px 14px;
  cursor: pointer;
  color: var(--text);
  font-family: var(--mono);
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  gap: 8px;
  transition: all 0.15s;
  -webkit-user-select: none;
  position: relative;
  overflow: hidden;
}
.btn-main::before {
  content: '';
  position: absolute;
  top: 0; left: 0;
  width: 3px; height: 100%;
  background: var(--border2);
  transition: background 0.2s;
}
.btn-main.in::before { background: var(--blue); }
.btn-main.out::before { background: var(--red); }
.btn-main:active:not(:disabled) { transform: scale(0.97); }
.btn-main:disabled { opacity: 0.25; cursor: default; }
.btn-main.in:not(:disabled) { border-color: rgba(30,111,255,0.3); background: rgba(30,111,255,0.05); }
.btn-main.out:not(:disabled) { border-color: rgba(255,45,45,0.3); background: rgba(255,45,45,0.05); }
.btn-num { font-family: var(--display); font-size: 32px; line-height: 1; }
.btn-main.in:not(:disabled) .btn-num { color: var(--blue); }
.btn-main.out:not(:disabled) .btn-num { color: var(--red); }
.btn-label { font-size: 11px; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; }
.btn-time { font-size: 10px; color: var(--muted); letter-spacing: 0.05em; }

.tabs {
  display: flex;
  border-bottom: 1px solid var(--border2);
  padding: 0 20px;
  background: var(--bg2);
}
.tab {
  font-size: 10px;
  padding: 11px 0;
  margin-right: 24px;
  color: var(--muted);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  background: none;
  border-left: none;
  border-right: none;
  border-top: none;
  font-family: var(--mono);
  transition: color 0.15s;
}
.tab.active { color: var(--red); border-bottom-color: var(--red); }

.content { flex: 1; overflow-y: auto; padding: 12px 20px; background: var(--bg); }

.day-row {
  display: flex;
  align-items: center;
  padding: 11px 0;
  border-bottom: 1px solid var(--border);
  gap: 10px;
  cursor: pointer;
  transition: background 0.1s;
}
.day-row:last-child { border-bottom: none; }
.day-row:active { background: var(--bg3); margin: 0 -20px; padding-left: 20px; padding-right: 20px; }
.day-date { font-size: 12px; min-width: 34px; color: var(--muted); font-family: var(--mono); }
.day-times { flex: 1; font-size: 11px; color: var(--muted); line-height: 1.6; }
.day-must { font-size: 10px; color: var(--border2); }
.day-diff { font-size: 16px; font-weight: 700; min-width: 56px; text-align: right; font-family: var(--display); letter-spacing: 0.05em; }
.day-diff.plus { color: var(--yellow); }
.day-diff.minus { color: var(--red); }
.day-diff.zero { color: var(--muted); }

.week-row {
  display: flex;
  align-items: center;
  padding: 13px 0;
  border-bottom: 1px solid var(--border);
  gap: 10px;
}
.week-row:last-child { border-bottom: none; }
.week-label { font-size: 10px; color: var(--muted); flex: 1; letter-spacing: 0.05em; }
.week-days { font-size: 10px; color: var(--muted); }
.week-diff { font-size: 18px; font-family: var(--display); min-width: 60px; text-align: right; letter-spacing: 0.05em; }
.week-diff.plus { color: var(--yellow); }
.week-diff.minus { color: var(--red); }
.week-diff.zero { color: var(--muted); }

.empty { text-align: center; padding: 60px 20px; color: var(--muted); font-size: 12px; line-height: 2; letter-spacing: 0.05em; }
.empty-big { font-family: var(--display); font-size: 40px; color: var(--border2); letter-spacing: 0.1em; display: block; margin-bottom: 12px; }

.overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.85);
  z-index: 100;
  align-items: flex-end;
  justify-content: center;
}
.overlay.open { display: flex; }
.sheet {
  background: var(--bg2);
  border-radius: 0;
  border-top: 2px solid var(--red);
  padding: 20px 20px 40px;
  width: 100%;
  max-width: 420px;
}
.sheet-handle { width: 36px; height: 3px; background: var(--border2); margin: 0 auto 20px; }
.sheet-title { font-family: var(--display); font-size: 20px; letter-spacing: 0.1em; margin-bottom: 16px; color: var(--red); }
.field { margin-bottom: 14px; }
.field label { font-size: 9px; color: var(--muted); letter-spacing: 0.15em; text-transform: uppercase; display: block; margin-bottom: 6px; }
.field input {
  width: 100%;
  background: var(--bg3);
  border: 1px solid var(--border2);
  border-radius: 0;
  padding: 12px 14px;
  font-size: 16px;
  font-family: var(--mono);
  color: var(--text);
  outline: none;
  -webkit-appearance: none;
  transition: border-color 0.2s;
}
.field input:focus { border-color: var(--red); }
.sheet-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 16px; }
.sheet-btn {
  padding: 13px;
  border-radius: 0;
  font-family: var(--mono);
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  cursor: pointer;
  border: 1px solid var(--border2);
  background: var(--bg3);
  color: var(--muted);
  transition: all 0.15s;
}
.sheet-btn:active { transform: scale(0.97); }
.sheet-btn.save { border-color: var(--blue); color: var(--blue); background: var(--blue-dim); }
.sheet-btn.del { border-color: var(--red); color: var(--red); background: var(--red-dim); }
.sheet-btn-full { grid-column: 1/-1; }

.clear-wrap { padding: 48px 20px 20px; text-align: center; }
.clear-btn {
  background: none; border: none;
  color: var(--border2);
  font-size: 9px;
  font-family: var(--mono);
  cursor: pointer;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  transition: color 0.2s;
}
.clear-btn:active { color: var(--muted); }

.confirm-note { font-size: 11px; color: var(--muted); margin-bottom: 16px; line-height: 1.7; letter-spacing: 0.03em; }
.confirm-note span { color: var(--red); font-weight: 700; }
.confirm-err { display: none; font-size: 10px; color: var(--red); margin-top: -6px; margin-bottom: 10px; letter-spacing: 0.05em; }
</style>
</head>
<body>
<div class="scanline"></div>

<div class="topbar">
  <div>
    <div class="app-title">WORK//TIME</div>
    <div class="app-sub">СИСТЕМА УЧЁТА РАБОЧЕГО ВРЕМЕНИ</div>
  </div>
  <div class="status-pill" id="status-pill">
    <span class="status-dot"></span>
    <span id="status-text">OFFLINE</span>
  </div>
</div>

<div class="total-section">
  <div class="total-label">Баланс за период</div>
  <div class="total-value" id="total-val">—</div>
  <div class="total-meta" id="total-meta">НЕТ ЗАПИСЕЙ</div>
</div>

<div class="btn-section">
  <button class="btn-main in" id="btn-in" onclick="handleIn()">
    <div class="btn-num">→</div>
    <div class="btn-label">Пришёл</div>
    <div class="btn-time" id="btn-in-time">нажми при входе</div>
  </button>
  <button class="btn-main out" id="btn-out" onclick="handleOut()" disabled>
    <div class="btn-num">←</div>
    <div class="btn-label">Ушёл</div>
    <div class="btn-time" id="btn-out-time">сначала приход</div>
  </button>
</div>

<div class="tabs">
  <button class="tab active" onclick="showTab('days')" id="tab-days">По дням</button>
  <button class="tab" onclick="showTab('week')" id="tab-week">Неделя</button>
</div>

<div class="content" id="content"></div>

<div class="clear-wrap">
  <button class="clear-btn" onclick="openConfirm()">// очистить данные //</button>
</div>

<div class="overlay" id="overlay">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title" id="sheet-title">РЕДАКТИРОВАТЬ</div>
    <div class="field">
      <label>Дата</label>
      <input type="date" id="edit-date">
    </div>
    <div class="field">
      <label>Пришёл</label>
      <input type="time" id="edit-in">
    </div>
    <div class="field">
      <label>Ушёл</label>
      <input type="time" id="edit-out">
    </div>
    <div class="sheet-btns">
      <button class="sheet-btn" onclick="closeSheet()">Отмена</button>
      <button class="sheet-btn save" onclick="saveEdit()">Сохранить</button>
      <button class="sheet-btn del sheet-btn-full" onclick="deleteRecord()">Удалить запись</button>
    </div>
  </div>
</div>

<div class="overlay" id="confirm-overlay">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title">СБРОС ДАННЫХ</div>
    <div class="confirm-note">Удалит всю историю без возможности восстановления. Введи <span>DELETE</span> для подтверждения.</div>
    <div class="field">
      <label>Подтверждение</label>
      <input type="text" id="confirm-input" placeholder="DELETE" autocomplete="off" autocorrect="off" spellcheck="false">
    </div>
    <div class="confirm-err" id="confirm-err">ВВЕДИ DELETE ЗАГЛАВНЫМИ БУКВАМИ</div>
    <div class="sheet-btns">
      <button class="sheet-btn" onclick="closeConfirm()">Отмена</button>
      <button class="sheet-btn del" onclick="confirmDelete()">Удалить всё</button>
    </div>
  </div>
</div>

<script>
const WORK_MIN = 8 * 60 + 30;
const KEY = 'wt_v3';
let data = { records: [], todayIn: null };
let editIdx = null;
let currentTab = 'days';

function load() {
  try { data = JSON.parse(localStorage.getItem(KEY)) || { records: [], todayIn: null }; } catch(e) {}
  if (!data.records) data.records = [];
}
function save() { localStorage.setItem(KEY, JSON.stringify(data)); }

function todayStr() { return new Date().toISOString().slice(0,10); }
function fmtTime(iso) {
  if (!iso) return '--:--';
  const d = new Date(iso);
  return String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
}
function fmtDate(s) {
  const [,m,d] = s.split('-');
  return d + '/' + m;
}
function calcDiff(inIso, outIso) {
  if (!inIso || !outIso) return null;
  return Math.round((new Date(outIso) - new Date(inIso)) / 60000 - WORK_MIN);
}
function mustLeave(inIso) {
  if (!inIso) return '--:--';
  return fmtTime(new Date(new Date(inIso).getTime() + WORK_MIN * 60000).toISOString());
}
function diffStr(diff) {
  if (diff === null) return { t: '—', c: 'zero' };
  const abs = Math.abs(diff);
  const h = Math.floor(abs/60), m = abs%60;
  let t = h > 0 ? h+'Ч ' : '';
  t += m+'М';
  if (diff > 0) return { t: '+'+t, c: 'plus' };
  if (diff < 0) return { t: '−'+t, c: 'minus' };
  return { t: '0М', c: 'zero' };
}

function handleIn() {
  data.todayIn = new Date().toISOString();
  save(); render();
}
function handleOut() {
  if (!data.todayIn) return;
  const out = new Date().toISOString();
  const date = todayStr();
  const idx = data.records.findIndex(r => r.date === date);
  const rec = { date, inTime: data.todayIn, outTime: out };
  if (idx >= 0) data.records[idx] = rec; else data.records.push(rec);
  data.todayIn = null;
  save(); render();
}

function render() {
  renderStatus();
  renderTotal();
  renderContent();
}

function renderStatus() {
  const pill = document.getElementById('status-pill');
  const txt = document.getElementById('status-text');
  const btnIn = document.getElementById('btn-in');
  const btnOut = document.getElementById('btn-out');
  const inTime = document.getElementById('btn-in-time');
  const outTime = document.getElementById('btn-out-time');
  if (data.todayIn) {
    pill.classList.add('active');
    txt.textContent = 'С ' + fmtTime(data.todayIn);
    btnIn.disabled = true;
    btnOut.disabled = false;
    inTime.textContent = 'зафиксировано';
    outTime.textContent = 'уйти до ' + mustLeave(data.todayIn);
  } else {
    pill.classList.remove('active');
    txt.textContent = 'OFFLINE';
    btnIn.disabled = false;
    btnOut.disabled = true;
    inTime.textContent = 'нажми при входе';
    outTime.textContent = 'сначала приход';
  }
}

function renderTotal() {
  const el = document.getElementById('total-val');
  const meta = document.getElementById('total-meta');
  if (!data.records.length) { el.textContent = '—'; el.className = 'total-value'; meta.textContent = 'НЕТ ЗАПИСЕЙ'; return; }
  const total = data.records.reduce((s, r) => s + (calcDiff(r.inTime, r.outTime) || 0), 0);
  const { t, c } = diffStr(total === 0 ? 0 : total);
  el.textContent = total === 0 ? '0М' : t;
  el.className = 'total-value ' + c;
  const pos = data.records.filter(r => (calcDiff(r.inTime,r.outTime)||0) > 0).length;
  const neg = data.records.filter(r => (calcDiff(r.inTime,r.outTime)||0) < 0).length;
  meta.textContent = data.records.length + ' ДН  ↑' + pos + '  ↓' + neg;
}

function showTab(tab) {
  currentTab = tab;
  document.getElementById('tab-days').classList.toggle('active', tab==='days');
  document.getElementById('tab-week').classList.toggle('active', tab==='week');
  renderContent();
}

function renderContent() {
  const el = document.getElementById('content');
  if (currentTab === 'days') renderDays(el);
  else renderWeek(el);
}

function renderDays(el) {
  const sorted = [...data.records].sort((a,b) => b.date.localeCompare(a.date));
  if (!sorted.length) {
    el.innerHTML = '<div class="empty"><span class="empty-big">STANDBY</span>Нажми «Пришёл»<br>когда придёшь на работу</div>';
    return;
  }
  el.innerHTML = sorted.map(r => {
    const realIdx = data.records.indexOf(r);
    const diff = calcDiff(r.inTime, r.outTime);
    const { t, c } = diffStr(diff);
    return `<div class="day-row" onclick="openEdit(${realIdx})">
      <div class="day-date">${fmtDate(r.date)}</div>
      <div class="day-times">
        <div>${fmtTime(r.inTime)} → ${r.outTime ? fmtTime(r.outTime) : '...'}</div>
        ${r.inTime ? `<div class="day-must">уйти до ${mustLeave(r.inTime)}</div>` : ''}
      </div>
      <div class="day-diff ${c}">${t}</div>
    </div>`;
  }).join('');
}

function renderWeek(el) {
  const weeks = {};
  data.records.forEach(r => {
    const d = new Date(r.date);
    const mon = new Date(d);
    mon.setDate(d.getDate() - ((d.getDay()+6)%7));
    const key = mon.toISOString().slice(0,10);
    if (!weeks[key]) weeks[key] = [];
    weeks[key].push(r);
  });
  const keys = Object.keys(weeks).sort((a,b) => b.localeCompare(a));
  if (!keys.length) { el.innerHTML = '<div class="empty"><span class="empty-big">STANDBY</span>Нет данных</div>'; return; }
  el.innerHTML = keys.map(wk => {
    const recs = weeks[wk];
    const total = recs.reduce((s,r) => s + (calcDiff(r.inTime,r.outTime)||0), 0);
    const { t, c } = diffStr(total === 0 ? 0 : total);
    const d = new Date(wk);
    const end = new Date(d); end.setDate(d.getDate()+4);
    const label = fmtDate(wk) + ' – ' + fmtDate(end.toISOString().slice(0,10));
    return `<div class="week-row">
      <div class="week-label">${label}</div>
      <div class="week-days">${recs.length} ДН</div>
      <div class="week-diff ${c}">${total===0?'0М':t}</div>
    </div>`;
  }).join('');
}

function openEdit(idx) {
  editIdx = idx;
  const r = data.records[idx];
  document.getElementById('sheet-title').textContent = fmtDate(r.date);
  document.getElementById('edit-date').value = r.date;
  document.getElementById('edit-in').value = r.inTime ? fmtTime(r.inTime) : '';
  document.getElementById('edit-out').value = r.outTime ? fmtTime(r.outTime) : '';
  document.getElementById('overlay').classList.add('open');
}
function closeSheet() { document.getElementById('overlay').classList.remove('open'); editIdx = null; }
function saveEdit() {
  if (editIdx === null) return;
  const date = document.getElementById('edit-date').value;
  const inV = document.getElementById('edit-in').value;
  const outV = document.getElementById('edit-out').value;
  if (!date) return;
  data.records[editIdx] = {
    date,
    inTime: inV ? date+'T'+inV+':00' : null,
    outTime: outV ? date+'T'+outV+':00' : null
  };
  save(); closeSheet(); render();
}
function deleteRecord() {
  if (editIdx === null) return;
  data.records.splice(editIdx, 1);
  save(); closeSheet(); render();
}

function openConfirm() {
  document.getElementById('confirm-input').value = '';
  document.getElementById('confirm-err').style.display = 'none';
  document.getElementById('confirm-overlay').classList.add('open');
  setTimeout(() => document.getElementById('confirm-input').focus(), 100);
}
function closeConfirm() { document.getElementById('confirm-overlay').classList.remove('open'); }
function confirmDelete() {
  if (document.getElementById('confirm-input').value !== 'DELETE') {
    document.getElementById('confirm-err').style.display = 'block';
    document.getElementById('confirm-input').value = '';
    return;
  }
  data = { records: [], todayIn: null };
  save(); closeConfirm(); render();
}

document.getElementById('overlay').addEventListener('click', function(e) { if (e.target===this) closeSheet(); });
document.getElementById('confirm-overlay').addEventListener('click', function(e) { if (e.target===this) closeConfirm(); });

load(); render();
if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(()=>{});
</script>
</body>
</html>

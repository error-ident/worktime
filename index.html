:root {
  --bg:    #000000;
  --bg2:   #0c0c0c;
  --bg3:   #161616;
  --white: #ffffff;
  --g1:    #ffffff;
  --g2:    #ffffff;
  --g3:    #aaaaaa;
  --g4:    #666666;
  --border:#2a2a2a;
  --ndot:  "Ndot57", "Courier New", monospace;
  --mono:  "LetteraMono", "Share Tech Mono", monospace;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; background: var(--bg); color: var(--white); font-family: var(--mono); overscroll-behavior: none; }
body { display: flex; flex-direction: column; max-width: 420px; margin: 0 auto; }

/* ── TOPBAR ── */
.topbar {
  padding: 52px 20px 14px;
  display: flex; justify-content: space-between; align-items: flex-end;
}
.app-title {
  font-family: var(--ndot);
  font-size: 22px;
  letter-spacing: 0.15em;
  color: var(--white);
  line-height: 1;
}
.status-row { display: flex; align-items: center; gap: 7px; }
.sdot {
  width: 8px; height: 8px; border-radius: 50%;
  border: 1px solid var(--g3); background: transparent;
  flex-shrink: 0; transition: all 0.3s;
}
.sdot.on { background: var(--white); border-color: var(--white); animation: blink 1.2s step-end infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.15} }
.stext { font-family: var(--ndot); font-size: 11px; color: var(--g4); letter-spacing: 0.12em; transition: color 0.3s; }
.stext.on { color: var(--g1); }

/* ── TOTAL ── */
.total {
  padding: 24px 20px 20px;
  border-top: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
}
.total-lbl { font-family: var(--ndot); font-size: 10px; color: var(--g3); letter-spacing: 0.25em; text-transform: uppercase; margin-bottom: 8px; }
.total-val {
  font-family: var(--ndot);
  font-size: 60px;
  line-height: 1;
  color: var(--white);
  letter-spacing: 0.02em;
  transition: color 0.3s;
}
.total-val.plus { color: var(--white); }
.total-val.minus { color: var(--g1); }
.total-meta { font-family: var(--ndot); font-size: 10px; color: var(--g3); margin-top: 8px; letter-spacing: 0.1em; }

/* ── BUTTONS ── */
.btns {
  padding: 16px 20px;
  display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
  border-bottom: 1px solid var(--border);
}
.btn {
  background: var(--bg);
  border: 1px solid var(--g4);
  border-radius: 0;
  padding: 18px 14px 16px;
  cursor: pointer;
  display: flex; flex-direction: column; align-items: flex-start; gap: 10px;
  transition: all 0.12s;
  -webkit-user-select: none;
}
.btn:active:not(:disabled) { background: var(--bg3); transform: scale(0.97); }
.btn:disabled { opacity: 0.18; cursor: default; }
.btn.in:not(:disabled)  { border-color: var(--white); }
.btn.out:not(:disabled) { border-color: var(--white); }
.btn-arrow { font-family: var(--ndot); font-size: 26px; color: var(--g3); transition: color 0.2s; line-height: 1; }
.btn:not(:disabled) .btn-arrow { color: var(--white); }
.btn-lbl { font-family: var(--ndot); font-size: 11px; letter-spacing: 0.2em; color: var(--g2); text-transform: uppercase; }
.btn:not(:disabled) .btn-lbl { color: var(--white); }
.btn-hint { font-family: var(--mono); font-size: 10px; color: var(--g3); letter-spacing: 0.04em; line-height: 1.4; }
.btn:not(:disabled) .btn-hint { color: var(--g2); }

/* ── TABS ── */
.tabs {
  display: flex; border-bottom: 1px solid var(--border);
  padding: 0 20px; background: var(--bg);
}
.tab {
  font-family: var(--ndot); font-size: 10px;
  padding: 11px 0; margin-right: 28px;
  color: var(--g3); cursor: pointer;
  border: none; border-bottom: 1px solid transparent;
  letter-spacing: 0.18em; text-transform: uppercase;
  background: none; transition: color 0.12s;
}
.tab.active { color: var(--white); border-bottom-color: var(--white); }

/* ── CONTENT ── */
.content { flex: 1; overflow-y: auto; padding: 0 20px; background: var(--bg); }

.day-row {
  display: flex; align-items: center;
  padding: 13px 0; border-bottom: 1px solid var(--border);
  gap: 10px; cursor: pointer;
}
.day-row:last-child { border-bottom: none; }
.day-row:active { opacity: 0.5; }
.day-date { font-family: var(--ndot); font-size: 12px; min-width: 38px; color: var(--g2); }
.day-times { flex: 1; }
.day-t { font-family: var(--mono); font-size: 12px; color: var(--g1); }
.day-must { font-family: var(--mono); font-size: 10px; color: var(--g3); margin-top: 3px; }
.day-diff { font-family: var(--ndot); font-size: 15px; min-width: 54px; text-align: right; }
.day-diff.plus  { color: var(--white); }
.day-diff.minus { color: var(--g1); }
.day-diff.zero  { color: var(--g3); }

.week-row {
  display: flex; align-items: center;
  padding: 13px 0; border-bottom: 1px solid var(--border); gap: 10px;
}
.week-row:last-child { border-bottom: none; }
.wlbl  { font-family: var(--ndot); font-size: 11px; color: var(--g1); flex: 1; }
.wdays { font-family: var(--mono); font-size: 10px; color: var(--g3); }
.wdiff { font-family: var(--ndot); font-size: 15px; min-width: 56px; text-align: right; }
.wdiff.plus  { color: var(--white); }
.wdiff.minus { color: var(--g1); }
.wdiff.zero  { color: var(--g3); }

.empty {
  text-align: center; padding: 60px 20px;
  font-family: var(--ndot); font-size: 11px;
  color: var(--g3); line-height: 2.5; letter-spacing: 0.15em;
}
.empty-sym { font-size: 36px; display: block; margin-bottom: 16px; color: var(--g4); }

/* ── OVERLAY / SHEET ── */
.overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.92); z-index: 100;
  align-items: flex-end; justify-content: center;
}
.overlay.open { display: flex; }
.sheet {
  background: var(--bg2);
  border-top: 1px solid var(--g3);
  padding: 20px 20px 44px;
  width: 100%; max-width: 420px;
}
.sheet-handle { width: 32px; height: 2px; background: var(--g4); margin: 0 auto 22px; }
.sheet-title { font-family: var(--ndot); font-size: 13px; letter-spacing: 0.2em; text-transform: uppercase; margin-bottom: 18px; color: var(--white); }
.field { margin-bottom: 14px; }
.field label { font-family: var(--ndot); font-size: 9px; color: var(--g2); letter-spacing: 0.2em; text-transform: uppercase; display: block; margin-bottom: 6px; }
.field input {
  width: 100%; background: var(--bg3); border: 1px solid var(--g4); border-radius: 0;
  padding: 12px 14px; font-size: 16px; font-family: var(--mono);
  color: var(--white); outline: none; -webkit-appearance: none; transition: border-color 0.2s;
}
.field input:focus { border-color: var(--g2); }
.sheet-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 18px; }
.sbtn {
  padding: 13px; border-radius: 0;
  font-family: var(--ndot); font-size: 9px; letter-spacing: 0.15em; text-transform: uppercase;
  cursor: pointer; border: 1px solid var(--g4); background: var(--bg3); color: var(--g3);
  transition: all 0.12s;
}
.sbtn:active { opacity: 0.6; }
.sbtn.save { border-color: var(--white); color: var(--white); }
.sbtn.del  { border-color: var(--g2);    color: var(--g1); }
.sbtn-full { grid-column: 1/-1; }

/* ── CLEAR ── */
.clear-wrap { padding: 52px 20px 24px; text-align: center; }
.clear-btn {
  background: none; border: none; color: var(--g4);
  font-family: var(--ndot); font-size: 9px; cursor: pointer;
  letter-spacing: 0.2em; text-transform: uppercase; padding: 8px;
}
.clear-btn:active { color: var(--g3); }
.confirm-note { font-family: var(--mono); font-size: 11px; color: var(--g1); margin-bottom: 16px; line-height: 1.8; }
.confirm-note b { color: var(--white); font-family: var(--ndot); letter-spacing: 0.1em; }
.confirm-err { display: none; font-family: var(--ndot); font-size: 9px; color: var(--g1); margin-top: -6px; margin-bottom: 10px; letter-spacing: 0.1em; }
</style>
</head>
<body>

<div class="topbar">
  <div class="app-title">WORK TIME</div>
  <div class="status-row">
    <div class="sdot" id="sdot"></div>
    <span class="stext" id="stext">OFFLINE</span>
  </div>
</div>

<div class="total">
  <div class="total-lbl">Баланс</div>
  <div class="total-val" id="total-val">—</div>
  <div class="total-meta" id="total-meta">нет записей</div>
</div>

<div class="btns">
  <button class="btn in" id="btn-in" onclick="handleIn()">
    <div class="btn-arrow">→</div>
    <div class="btn-lbl">Пришёл</div>
    <div class="btn-hint" id="hint-in">нажми при входе</div>
  </button>
  <button class="btn out" id="btn-out" onclick="handleOut()" disabled>
    <div class="btn-arrow">←</div>
    <div class="btn-lbl">Ушёл</div>
    <div class="btn-hint" id="hint-out">сначала приход</div>
  </button>
</div>

<div class="tabs">
  <button class="tab active" onclick="showTab('days')" id="tab-days">По дням</button>
  <button class="tab" onclick="showTab('week')" id="tab-week">Неделя</button>
</div>

<div class="content" id="content"></div>
<div class="clear-wrap"><button class="clear-btn" onclick="openConfirm()">очистить данные</button></div>

<!-- edit -->
<div class="overlay" id="overlay">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title" id="sheet-title">Редактировать</div>
    <div class="field"><label>Дата</label><input type="date" id="edit-date"></div>
    <div class="field"><label>Пришёл</label><input type="time" id="edit-in"></div>
    <div class="field"><label>Ушёл</label><input type="time" id="edit-out"></div>
    <div class="sheet-btns">
      <button class="sbtn" onclick="closeSheet()">Отмена</button>
      <button class="sbtn save" onclick="saveEdit()">Сохранить</button>
      <button class="sbtn del sbtn-full" onclick="deleteRecord()">Удалить запись</button>
    </div>
  </div>
</div>

<!-- confirm -->
<div class="overlay" id="confirm-overlay">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title">Сброс данных</div>
    <div class="confirm-note">Удалит всю историю без восстановления.<br>Введи <b>DELETE</b> для подтверждения.</div>
    <div class="field"><label>Подтверждение</label><input type="text" id="confirm-input" placeholder="DELETE" autocomplete="off" autocorrect="off" spellcheck="false"></div>
    <div class="confirm-err" id="confirm-err">Введи DELETE заглавными буквами</div>
    <div class="sheet-btns">
      <button class="sbtn" onclick="closeConfirm()">Отмена</button>
      <button class="sbtn del" onclick="confirmDelete()">Удалить всё</button>
    </div>
  </div>
</div>

<script>
const WORK_MIN = 510; // 8h30m
const KEY = 'wt_v3';
let data = { records: [], todayIn: null };
let editIdx = null, currentTab = 'days';

function load() {
  try { data = JSON.parse(localStorage.getItem(KEY)) || { records: [], todayIn: null }; } catch(e) {}
  if (!data.records) data.records = [];
}
function save() { localStorage.setItem(KEY, JSON.stringify(data)); }
function todayStr() { return new Date().toISOString().slice(0,10); }
function fmtTime(iso) {
  if (!iso) return '--:--';
  // Always parse as local: replace T with space so no UTC assumption
  const s = iso.length >= 19 ? iso.slice(0,19).replace('T',' ') : iso;
  const d = new Date(s);
  return d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0');
}
function fmtDate(s) { const [,m,d]=s.split('-'); return d+'/'+m; }
function parseLocal(s) { return s ? new Date(s.length===19 ? s.replace('T',' ') : s) : null; }
function calcDiff(a,b) { if(!a||!b) return null; return Math.round((parseLocal(b)-parseLocal(a))/60000-WORK_MIN); }
function mustLeave(iso) {
  if(!iso) return '--:--';
  const d = parseLocal(iso);
  const ml = new Date(d.getTime()+WORK_MIN*60000);
  return ml.getHours().toString().padStart(2,'0')+':'+ml.getMinutes().toString().padStart(2,'0');
}
function diffStr(diff) {
  if (diff===null) return {t:'—',c:'zero'};
  const a=Math.abs(diff), h=Math.floor(a/60), m=a%60;
  let t = (h?h+'ч ':'')+m+'м';
  return diff>0?{t:'+'+t,c:'plus'}:diff<0?{t:'−'+t,c:'minus'}:{t:'0м',c:'zero'};
}

function handleIn() {
  const now = new Date();
  const pad = n => String(n).padStart(2,'0');
  // Store as local datetime string YYYY-MM-DDTHH:MM:SS
  data.todayIn = now.getFullYear()+'-'+pad(now.getMonth()+1)+'-'+pad(now.getDate())+'T'+pad(now.getHours())+':'+pad(now.getMinutes())+':'+pad(now.getSeconds());
  save(); render();
}
function handleOut() {
  if (!data.todayIn) return;
  const date=todayStr();
  const now=new Date(), pad=n=>String(n).padStart(2,'0');
  const out=now.getFullYear()+'-'+pad(now.getMonth()+1)+'-'+pad(now.getDate())+'T'+pad(now.getHours())+':'+pad(now.getMinutes())+':'+pad(now.getSeconds());
  const rec={date,inTime:data.todayIn,outTime:out};
  const i=data.records.findIndex(r=>r.date===date);
  if(i>=0) data.records[i]=rec; else data.records.push(rec);
  data.todayIn=null; save(); render();
}

function render() { renderStatus(); renderTotal(); renderContent(); }

function renderStatus() {
  const dot=document.getElementById('sdot'), txt=document.getElementById('stext');
  const bi=document.getElementById('btn-in'), bo=document.getElementById('btn-out');
  const hi=document.getElementById('hint-in'), ho=document.getElementById('hint-out');
  if (data.todayIn) {
    dot.classList.add('on'); txt.classList.add('on');
    txt.textContent=fmtTime(data.todayIn);
    bi.disabled=true; bo.disabled=false;
    hi.textContent='зафиксировано';
    ho.textContent='уйти до '+mustLeave(data.todayIn);
  } else {
    dot.classList.remove('on'); txt.classList.remove('on');
    txt.textContent='OFFLINE';
    bi.disabled=false; bo.disabled=true;
    hi.textContent='нажми при входе';
    ho.textContent='сначала приход';
  }
}

function renderTotal() {
  const el=document.getElementById('total-val'), meta=document.getElementById('total-meta');
  if (!data.records.length) { el.textContent='—'; el.className='total-val'; meta.textContent='нет записей'; return; }
  const total=data.records.reduce((s,r)=>s+(calcDiff(r.inTime,r.outTime)||0),0);
  const {t,c}=diffStr(total===0?0:total);
  el.textContent=total===0?'0м':t; el.className='total-val '+c;
  const pos=data.records.filter(r=>(calcDiff(r.inTime,r.outTime)||0)>0).length;
  const neg=data.records.filter(r=>(calcDiff(r.inTime,r.outTime)||0)<0).length;
  meta.textContent=data.records.length+' дн  ·  +'+pos+'  −'+neg;
}

function showTab(tab) {
  currentTab=tab;
  document.getElementById('tab-days').classList.toggle('active',tab==='days');
  document.getElementById('tab-week').classList.toggle('active',tab==='week');
  renderContent();
}

function renderContent() {
  const el=document.getElementById('content');
  currentTab==='days'?renderDays(el):renderWeek(el);
}

function renderDays(el) {
  const sorted=[...data.records].sort((a,b)=>b.date.localeCompare(a.date));
  if (!sorted.length) { el.innerHTML='<div class="empty"><span class="empty-sym">○</span>Нажми «Пришёл»<br>когда придёшь на работу</div>'; return; }
  el.innerHTML=sorted.map(r=>{
    const ri=data.records.indexOf(r), diff=calcDiff(r.inTime,r.outTime), {t,c}=diffStr(diff);
    return `<div class="day-row" onclick="openEdit(${ri})">
      <div class="day-date">${fmtDate(r.date)}</div>
      <div class="day-times">
        <div class="day-t">${fmtTime(r.inTime)} → ${r.outTime?fmtTime(r.outTime):'...'}</div>
        ${r.inTime?`<div class="day-must">уйти до ${mustLeave(r.inTime)}</div>`:''}
      </div>
      <div class="day-diff ${c}">${t}</div>
    </div>`;
  }).join('');
}

function renderWeek(el) {
  const weeks={};
  data.records.forEach(r=>{
    const d=new Date(r.date), mon=new Date(d);
    mon.setDate(d.getDate()-((d.getDay()+6)%7));
    const k=mon.toISOString().slice(0,10);
    if(!weeks[k]) weeks[k]=[];
    weeks[k].push(r);
  });
  const keys=Object.keys(weeks).sort((a,b)=>b.localeCompare(a));
  if(!keys.length){el.innerHTML='<div class="empty"><span class="empty-sym">○</span>Нет данных</div>';return;}
  el.innerHTML=keys.map(wk=>{
    const recs=weeks[wk], total=recs.reduce((s,r)=>s+(calcDiff(r.inTime,r.outTime)||0),0);
    const {t,c}=diffStr(total===0?0:total);
    const d=new Date(wk), end=new Date(d); end.setDate(d.getDate()+4);
    return `<div class="week-row">
      <div class="wlbl">${fmtDate(wk)} – ${fmtDate(end.toISOString().slice(0,10))}</div>
      <div class="wdays">${recs.length} дн</div>
      <div class="wdiff ${c}">${total===0?'0м':t}</div>
    </div>`;
  }).join('');
}

function openEdit(idx) {
  editIdx=idx; const r=data.records[idx];
  document.getElementById('sheet-title').textContent=fmtDate(r.date);
  document.getElementById('edit-date').value=r.date;
  document.getElementById('edit-in').value=r.inTime?fmtTime(r.inTime):'';
  document.getElementById('edit-out').value=r.outTime?fmtTime(r.outTime):'';
  document.getElementById('overlay').classList.add('open');
}
function closeSheet(){document.getElementById('overlay').classList.remove('open');editIdx=null;}
function saveEdit(){
  if(editIdx===null)return;
  const date=document.getElementById('edit-date').value;
  const inV=document.getElementById('edit-in').value, outV=document.getElementById('edit-out').value;
  if(!date)return;
  // Build ISO with local timezone offset so Date parsing is consistent
  // Store as plain local datetime string, not UTC ISO
  const newInTime = inV ? date+'T'+inV+':00' : null;
  const newOutTime = outV ? date+'T'+outV+':00' : null;
  data.records[editIdx]={date, inTime:newInTime, outTime:newOutTime};
  // If editing today's active record — sync todayIn too
  if (data.todayIn && date === todayStr()) {
    data.todayIn = newInTime;
  }
  save();closeSheet();render();
}
function deleteRecord(){if(editIdx===null)return;data.records.splice(editIdx,1);save();closeSheet();render();}

function openConfirm(){
  document.getElementById('confirm-input').value='';
  document.getElementById('confirm-err').style.display='none';
  document.getElementById('confirm-overlay').classList.add('open');
  setTimeout(()=>document.getElementById('confirm-input').focus(),100);
}
function closeConfirm(){document.getElementById('confirm-overlay').classList.remove('open');}
function confirmDelete(){
  if(document.getElementById('confirm-input').value!=='DELETE'){
    document.getElementById('confirm-err').style.display='block';
    document.getElementById('confirm-input').value='';return;
  }
  data={records:[],todayIn:null};save();closeConfirm();render();
}

document.getElementById('overlay').addEventListener('click',function(e){if(e.target===this)closeSheet();});
document.getElementById('confirm-overlay').addEventListener('click',function(e){if(e.target===this)closeConfirm();});

const params=new URLSearchParams(window.location.search);
if(params.get('action')==='in'){load();handleIn();}
else if(params.get('action')==='out'){load();handleOut();}
else{load();render();}

if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(()=>{});
</script>
</body>
</html>

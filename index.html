<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Рабочее время">
<meta name="theme-color" content="#0f0f0f">
<title>Рабочее время</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Unbounded:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f0f0f;
  --surface: #1a1a1a;
  --surface2: #222;
  --border: #2a2a2a;
  --text: #f0f0f0;
  --muted: #666;
  --accent: #c8f55a;
  --accent-dim: rgba(200,245,90,0.12);
  --red: #ff5454;
  --red-dim: rgba(255,84,84,0.12);
  --mono: 'JetBrains Mono', monospace;
  --display: 'Unbounded', sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--mono); overscroll-behavior: none; }
body { display: flex; flex-direction: column; max-width: 420px; margin: 0 auto; }

.topbar {
  padding: 56px 20px 16px;
  border-bottom: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
}
.app-title { font-family: var(--display); font-size: 13px; font-weight: 700; letter-spacing: 0.05em; color: var(--muted); text-transform: uppercase; }
.status-pill {
  font-size: 11px;
  padding: 4px 10px;
  border-radius: 20px;
  border: 1px solid var(--border);
  color: var(--muted);
  transition: all 0.2s;
  display: flex;
  align-items: center;
  gap: 6px;
}
.status-pill.active { border-color: var(--accent); color: var(--accent); }
.status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--muted); flex-shrink: 0; }
.status-pill.active .status-dot { background: var(--accent); animation: pulse 1.5s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

.total-section {
  padding: 24px 20px;
  border-bottom: 1px solid var(--border);
}
.total-label { font-size: 11px; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 8px; }
.total-value {
  font-family: var(--display);
  font-size: 42px;
  font-weight: 700;
  line-height: 1;
  color: var(--text);
  transition: color 0.3s;
}
.total-value.plus { color: var(--accent); }
.total-value.minus { color: var(--red); }
.total-meta { font-size: 11px; color: var(--muted); margin-top: 8px; }

.btn-section {
  padding: 20px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  border-bottom: 1px solid var(--border);
}
.btn-main {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 20px 16px;
  cursor: pointer;
  color: var(--text);
  font-family: var(--mono);
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  gap: 10px;
  transition: all 0.15s;
  -webkit-user-select: none;
}
.btn-main:active:not(:disabled) { transform: scale(0.97); }
.btn-main:disabled { opacity: 0.3; cursor: default; }
.btn-main.in:not(:disabled) { border-color: var(--accent); background: var(--accent-dim); }
.btn-main.out:not(:disabled) { border-color: var(--red); background: var(--red-dim); }
.btn-icon { font-size: 24px; }
.btn-label { font-size: 13px; font-weight: 500; }
.btn-time { font-size: 11px; color: var(--muted); }
.btn-main.in:not(:disabled) .btn-label { color: var(--accent); }
.btn-main.out:not(:disabled) .btn-label { color: var(--red); }

.tabs {
  display: flex;
  border-bottom: 1px solid var(--border);
  padding: 0 20px;
}
.tab {
  font-size: 12px;
  padding: 12px 0;
  margin-right: 24px;
  color: var(--muted);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  letter-spacing: 0.04em;
  background: none;
  border-left: none;
  border-right: none;
  border-top: none;
  font-family: var(--mono);
  transition: color 0.15s;
}
.tab.active { color: var(--text); border-bottom-color: var(--accent); }

.content { flex: 1; overflow-y: auto; padding: 16px 20px; }

.day-row {
  display: flex;
  align-items: center;
  padding: 12px 0;
  border-bottom: 1px solid var(--border);
  gap: 12px;
  cursor: pointer;
  transition: background 0.1s;
}
.day-row:last-child { border-bottom: none; }
.day-row:active { background: var(--surface); margin: 0 -20px; padding-left: 20px; padding-right: 20px; }
.day-date { font-size: 13px; font-weight: 500; min-width: 36px; color: var(--muted); }
.day-times { flex: 1; font-size: 12px; color: var(--muted); }
.day-arrow { font-size: 11px; color: var(--border); }
.day-diff { font-size: 13px; font-weight: 700; min-width: 52px; text-align: right; font-family: var(--display); }
.day-diff.plus { color: var(--accent); }
.day-diff.minus { color: var(--red); }
.day-diff.zero { color: var(--muted); }
.day-must { font-size: 10px; color: var(--muted); margin-top: 2px; }

.empty { text-align: center; padding: 60px 20px; color: var(--muted); font-size: 13px; line-height: 1.8; }

/* modal */
.overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  z-index: 100;
  align-items: flex-end;
  justify-content: center;
}
.overlay.open { display: flex; }
.sheet {
  background: var(--surface);
  border-radius: 20px 20px 0 0;
  padding: 24px 20px 40px;
  width: 100%;
  max-width: 420px;
  border-top: 1px solid var(--border);
}
.sheet-handle { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 20px; }
.sheet-title { font-family: var(--display); font-size: 14px; font-weight: 700; margin-bottom: 20px; }
.field { margin-bottom: 16px; }
.field label { font-size: 11px; color: var(--muted); letter-spacing: 0.06em; text-transform: uppercase; display: block; margin-bottom: 6px; }
.field input {
  width: 100%;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 12px 14px;
  font-size: 16px;
  font-family: var(--mono);
  color: var(--text);
  outline: none;
  -webkit-appearance: none;
}
.field input:focus { border-color: var(--accent); }
.sheet-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
.sheet-btn {
  padding: 14px;
  border-radius: 12px;
  font-family: var(--mono);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  border: 1px solid var(--border);
  background: var(--surface2);
  color: var(--muted);
  transition: all 0.15s;
}
.sheet-btn:active { transform: scale(0.97); }
.sheet-btn.save { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }
.sheet-btn.del { background: var(--red-dim); border-color: var(--red); color: var(--red); }
.sheet-btn-full { grid-column: 1/-1; }
</style>
</head>
<body>

<div class="topbar">
  <span class="app-title">Work Time</span>
  <div class="status-pill" id="status-pill">
    <span class="status-dot"></span>
    <span id="status-text">не на работе</span>
  </div>
</div>

<div class="total-section">
  <div class="total-label">Итого за период</div>
  <div class="total-value" id="total-val">0 мин</div>
  <div class="total-meta" id="total-meta">нет записей</div>
</div>

<div class="btn-section">
  <button class="btn-main in" id="btn-in" onclick="handleIn()">
    <span class="btn-icon">→</span>
    <span class="btn-label">Пришёл</span>
    <span class="btn-time" id="btn-in-time">нажми когда пришёл</span>
  </button>
  <button class="btn-main out" id="btn-out" onclick="handleOut()" disabled>
    <span class="btn-icon">←</span>
    <span class="btn-label">Ушёл</span>
    <span class="btn-time" id="btn-out-time">сначала отметь приход</span>
  </button>
</div>

<div class="tabs">
  <button class="tab active" onclick="showTab('days')" id="tab-days">По дням</button>
  <button class="tab" onclick="showTab('week')" id="tab-week">Неделя</button>
</div>

<div class="content" id="content"></div>

<div class="overlay" id="overlay">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title" id="sheet-title">Редактировать</div>
    <div class="field">
      <label>Дата</label>
      <input type="date" id="edit-date">
    </div>
    <div class="field">
      <label>Пришёл</label>
      <input type="time" id="edit-in">
    </div>
    <div class="field">
      <label>Ушёл</label>
      <input type="time" id="edit-out">
    </div>
    <div class="sheet-btns">
      <button class="sheet-btn" onclick="closeSheet()">Отмена</button>
      <button class="sheet-btn save" onclick="saveEdit()">Сохранить</button>
      <button class="sheet-btn del sheet-btn-full" onclick="deleteRecord()">Удалить запись</button>
    </div>
  </div>
</div>

<script>
const WORK_MIN = 8 * 60 + 30;
const KEY = 'wt_v3';
let data = { records: [], todayIn: null };
let editIdx = null;
let currentTab = 'days';

function load() {
  try { data = JSON.parse(localStorage.getItem(KEY)) || { records: [], todayIn: null }; } catch(e) {}
  if (!data.records) data.records = [];
}
function save() { localStorage.setItem(KEY, JSON.stringify(data)); }

function now() { return new Date(); }
function todayStr() { return now().toISOString().slice(0,10); }
function fmtTime(iso) {
  if (!iso) return '--:--';
  const d = new Date(iso);
  return String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
}
function fmtDate(s) {
  const [,m,d] = s.split('-');
  return d + '/' + m;
}
function calcDiff(inIso, outIso) {
  if (!inIso || !outIso) return null;
  return Math.round((new Date(outIso) - new Date(inIso)) / 60000 - WORK_MIN);
}
function mustLeave(inIso) {
  if (!inIso) return '--:--';
  return fmtTime(new Date(new Date(inIso).getTime() + WORK_MIN * 60000).toISOString());
}
function diffStr(diff) {
  if (diff === null) return { t: '—', c: 'zero' };
  const abs = Math.abs(diff);
  const h = Math.floor(abs/60), m = abs%60;
  let t = h > 0 ? h+'ч ' : '';
  t += m+'м';
  if (diff > 0) return { t: '+'+t, c: 'plus' };
  if (diff < 0) return { t: '−'+t, c: 'minus' };
  return { t: '0м', c: 'zero' };
}

function handleIn() {
  data.todayIn = new Date().toISOString();
  save(); render();
}
function handleOut() {
  if (!data.todayIn) return;
  const out = new Date().toISOString();
  const date = todayStr();
  const idx = data.records.findIndex(r => r.date === date);
  const rec = { date, inTime: data.todayIn, outTime: out };
  if (idx >= 0) data.records[idx] = rec; else data.records.push(rec);
  data.todayIn = null;
  save(); render();
}

function render() {
  renderStatus();
  renderTotal();
  renderContent();
}

function renderStatus() {
  const pill = document.getElementById('status-pill');
  const txt = document.getElementById('status-text');
  const btnIn = document.getElementById('btn-in');
  const btnOut = document.getElementById('btn-out');
  const inTime = document.getElementById('btn-in-time');
  const outTime = document.getElementById('btn-out-time');

  if (data.todayIn) {
    pill.classList.add('active');
    txt.textContent = 'с ' + fmtTime(data.todayIn);
    btnIn.disabled = true;
    btnOut.disabled = false;
    inTime.textContent = 'зафиксировано';
    outTime.textContent = 'уйти до ' + mustLeave(data.todayIn);
  } else {
    pill.classList.remove('active');
    txt.textContent = 'не на работе';
    btnIn.disabled = false;
    btnOut.disabled = true;
    inTime.textContent = 'нажми когда пришёл';
    outTime.textContent = 'сначала отметь приход';
  }
}

function renderTotal() {
  const el = document.getElementById('total-val');
  const meta = document.getElementById('total-meta');
  const total = data.records.reduce((s, r) => {
    const d = calcDiff(r.inTime, r.outTime);
    return s + (d !== null ? d : 0);
  }, 0);
  const { t, c } = diffStr(total === 0 ? 0 : total);
  el.textContent = data.records.length ? (total === 0 ? '0 мин' : t) : '—';
  el.className = 'total-value ' + c;
  if (data.records.length) {
    const pos = data.records.filter(r => (calcDiff(r.inTime,r.outTime)||0) > 0).length;
    const neg = data.records.filter(r => (calcDiff(r.inTime,r.outTime)||0) < 0).length;
    meta.textContent = data.records.length + ' дн. · ↑' + pos + ' ↓' + neg;
  } else {
    meta.textContent = 'нет записей';
  }
}

function showTab(tab) {
  currentTab = tab;
  document.getElementById('tab-days').classList.toggle('active', tab==='days');
  document.getElementById('tab-week').classList.toggle('active', tab==='week');
  renderContent();
}

function renderContent() {
  const el = document.getElementById('content');
  if (currentTab === 'days') renderDays(el);
  else renderWeek(el);
}

function renderDays(el) {
  const sorted = [...data.records].sort((a,b) => b.date.localeCompare(a.date));
  if (!sorted.length) {
    el.innerHTML = '<div class="empty">Нажми «Пришёл»<br>когда придёшь на работу.<br>Данные сохраняются<br>в этом браузере.</div>';
    return;
  }
  el.innerHTML = sorted.map(r => {
    const realIdx = data.records.indexOf(r);
    const diff = calcDiff(r.inTime, r.outTime);
    const { t, c } = diffStr(diff);
    return `<div class="day-row" onclick="openEdit(${realIdx})">
      <div class="day-date">${fmtDate(r.date)}</div>
      <div class="day-times">
        <div>${fmtTime(r.inTime)} → ${r.outTime ? fmtTime(r.outTime) : '...'}</div>
        ${r.inTime ? `<div class="day-must">уйти до ${mustLeave(r.inTime)}</div>` : ''}
      </div>
      <div class="day-diff ${c}">${t}</div>
    </div>`;
  }).join('');
}

function renderWeek(el) {
  const weeks = {};
  data.records.forEach(r => {
    const d = new Date(r.date);
    const mon = new Date(d);
    mon.setDate(d.getDate() - ((d.getDay()+6)%7));
    const key = mon.toISOString().slice(0,10);
    if (!weeks[key]) weeks[key] = [];
    weeks[key].push(r);
  });
  const keys = Object.keys(weeks).sort((a,b) => b.localeCompare(a));
  if (!keys.length) {
    el.innerHTML = '<div class="empty">Нет данных</div>';
    return;
  }
  el.innerHTML = keys.map(wk => {
    const recs = weeks[wk];
    const total = recs.reduce((s,r) => s + (calcDiff(r.inTime,r.outTime)||0), 0);
    const { t, c } = diffStr(total === 0 ? 0 : total);
    const d = new Date(wk);
    const end = new Date(d); end.setDate(d.getDate()+4);
    const label = fmtDate(wk) + ' – ' + fmtDate(end.toISOString().slice(0,10));
    return `<div class="day-row" style="cursor:default">
      <div class="day-date" style="min-width:80px; font-size:11px; color:var(--muted)">${label}</div>
      <div class="day-times">${recs.length} дн.</div>
      <div class="day-diff ${c}">${total===0?'0м':t}</div>
    </div>`;
  }).join('');
}

function openEdit(idx) {
  editIdx = idx;
  const r = data.records[idx];
  document.getElementById('sheet-title').textContent = fmtDate(r.date);
  document.getElementById('edit-date').value = r.date;
  document.getElementById('edit-in').value = r.inTime ? fmtTime(r.inTime) : '';
  document.getElementById('edit-out').value = r.outTime ? fmtTime(r.outTime) : '';
  document.getElementById('overlay').classList.add('open');
}
function closeSheet() {
  document.getElementById('overlay').classList.remove('open');
  editIdx = null;
}
function saveEdit() {
  if (editIdx === null) return;
  const date = document.getElementById('edit-date').value;
  const inV = document.getElementById('edit-in').value;
  const outV = document.getElementById('edit-out').value;
  if (!date) return;
  data.records[editIdx] = {
    date,
    inTime: inV ? date+'T'+inV+':00' : null,
    outTime: outV ? date+'T'+outV+':00' : null
  };
  save(); closeSheet(); render();
}
function deleteRecord() {
  if (editIdx === null) return;
  data.records.splice(editIdx, 1);
  save(); closeSheet(); render();
}

document.getElementById('overlay').addEventListener('click', function(e) {
  if (e.target === this) closeSheet();
});

load(); render();

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}
</script>
</body>
</html>
